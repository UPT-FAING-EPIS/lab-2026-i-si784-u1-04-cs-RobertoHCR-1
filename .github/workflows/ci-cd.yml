name: Construcción y despliegue de una aplicación MVC a Azure

env:
  AZURE_WEBAPP_NAME: upt-awa-691
  DOTNET_VERSION: '8'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Shorten/**'
      - '.github/workflows/**'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# sonar: placeholder hook for the pending SonarCloud integration requested by the lab.

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image-ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image reference
        id: image-ref
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/shorten:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Inventory Image
        run: |
          docker build . --tag "${{ steps.image-ref.outputs.image }}"
          docker push "${{ steps.image-ref.outputs.image }}"

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Development
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Desplegar a Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          images: ${{ needs.build.outputs.image-ref }}
name: Construcción y despliegue de una aplicación MVC a Azure

env:
  AZURE_WEBAPP_NAME: upt-awa-691
  AZURE_RESOURCE_GROUP: upt-arg-691
  DOTNET_VERSION: '8'

on:
  push:
    branches: [ "main" ]
    paths:
      - 'Shorten/**'
      - '.github/workflows/**'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# sonar: placeholder hook for the pending SonarCloud integration requested by the lab.

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-ref: ${{ steps.image-ref.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Prepare image reference
        id: image-ref
        run: |
          echo "image=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/shorten:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Inventory Image
        run: |
          docker build . --tag "${{ steps.image-ref.outputs.image }}"
          docker push "${{ steps.image-ref.outputs.image }}"

  deploy:
    permissions:
      contents: none
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: Development
      url: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net

    steps:
      - name: Login azure
        run: |
          az login -u "${{ secrets.AZURE_USERNAME }}" -p "${{ secrets.AZURE_PASSWORD }}"

      - name: Configurar imagen del contenedor
        run: |
          az webapp config container set \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}" \
            --docker-custom-image-name "${{ needs.build.outputs.image-ref }}" \
            --docker-registry-server-url "https://ghcr.io"

      - name: Reiniciar Azure Web App
        run: |
          az webapp restart \
            --name "${{ env.AZURE_WEBAPP_NAME }}" \
            --resource-group "${{ env.AZURE_RESOURCE_GROUP }}"